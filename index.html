function calcScores(ans){
  const sums={},mn={},mx={};
  QS.forEach(q=>{mn[q.type]=(mn[q.type]||0)+q.w; mx[q.type]=(mx[q.type]||0)+5*q.w;});
  QS.forEach(q=>{
    const raw=ans[q.id]; if(raw==null)return;
    sums[q.type]=(sums[q.type]||0)+(q.rev?6-raw:raw)*q.w;
  });
  const scores={};
  Object.keys(sums).forEach(t=>{scores[t]=Math.round(((sums[t]-mn[t])/(mx[t]-mn[t]))*100);});
  return scores;
}

function getComposite(scores){
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const [t1,t2]=sorted;
  if(!t1||!t2)return null;
  const info=CT[`${t1[0]}+${t2[0]}`]||CT[`${t2[0]}+${t1[0]}`];
  return info?{...info,top1:t1,top2:t2,sorted}:{
    name:`${TN[t1[0]]} 우세형`,
    narrative:`${TN[t1[0]]} 패턴이 가장 강하게 작동하고 있어요. ${TN[t2[0]]} 패턴도 함께 나타나고 있습니다.`,
    pivot:"지금 이 패턴은 조건이 만들어낸 반응이에요. 조건이 달라지면 반응도 달라질 수 있어요.",
    top1:t1,top2:t2,sorted
  };
}

/* ── Radar ── */
function Radar({scores}){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current; if(!c)return;
    const dpr=window.devicePixelRatio||1, sz=260;
    c.width=sz*dpr; c.height=sz*dpr;
    c.style.width=sz+"px"; c.style.height=sz+"px";
    const ctx=c.getContext("2d"); ctx.scale(dpr,dpr);
    const cx=sz/2,cy=sz/2,R=sz*0.36;
    const grps=["A","B","C","D","E"];
    const gs=grps.map(g=>{const vs=Object.entries(scores).filter(([k])=>k.startsWith(g)).map(([,v])=>v);return vs.length?Math.max(...vs):0;});
    ctx.clearRect(0,0,sz,sz);
    // rings
    [20,40,60,80,100].forEach(v=>{
      ctx.beginPath();
      grps.forEach((_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2,r=(v/100)*R;
        i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));});
      ctx.closePath(); ctx.strokeStyle="rgba(78,168,222,0.15)"; ctx.lineWidth=1; ctx.stroke();
    });
    // spokes
    grps.forEach((_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));
      ctx.strokeStyle="rgba(78,168,222,0.2)"; ctx.lineWidth=1; ctx.stroke();});
    // fill
    ctx.beginPath();
    grps.forEach((_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2,r=(gs[i]/100)*R;
      i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));});
    ctx.closePath();
    ctx.fillStyle="rgba(78,168,222,0.15)"; ctx.fill();
    ctx.strokeStyle="#4EA8DE"; ctx.lineWidth=2.5; ctx.stroke();
    // dots
    grps.forEach((_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2,r=(gs[i]/100)*R;
      ctx.beginPath(); ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),5,0,Math.PI*2);
      ctx.fillStyle="#1A6FA8"; ctx.fill();});
    // labels
    ctx.font=`500 12px 'Noto Sans KR',sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
    grps.forEach((g,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2;
      ctx.fillStyle="#5A7A94";
      ctx.fillText(GN[g],cx+(R+26)*Math.cos(a),cy+(R+26)*Math.sin(a));});
  },[scores]);
  return <canvas ref={ref} style={{display:"block",margin:"0 auto"}}/>;
}

        {M1_OPTIONS.map((opt,i)=>(
          <button key={i} onClick={()=>setM1(i)}
            style={{padding:"17px 18px",borderRadius:14,
              border:m1===i?`2px solid ${CLR.sky}`:`2px solid ${CLR.border}`,
              background:m1===i?CLR.skyLt:CLR.card,
              color:m1===i?CLR.skyDk:CLR.txt,
              fontWeight:m1===i?600:400,fontSize:15,cursor:"pointer",textAlign:"left",
              transition:"all 0.18s",lineHeight:1.5}}>
            {opt}
          </button>
        ))}
      </div>
      <PrimaryBtn disabled={m1===null} onClick={()=>setPhase("survey")}>설문 시작하기</PrimaryBtn>
    </Page>
  );

  /* SURVEY */
  if(phase==="survey") return(
    <Page step="3" title={`${pg+1} / ${total} 페이지`} sub={`${pct}% 완료`}>
      {/* progress bar */}
      <div style={{background:CLR.border,borderRadius:99,height:4,marginBottom:22}}>
        <div style={{background:`linear-gradient(90deg,${CLR.sky},${CLR.skyDk})`,
          height:4,borderRadius:99,width:`${pct}%`,transition:"width 0.5s"}}/>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:22}}>
        {pageQs.map(q=>{
          const scale=q.freq?FREQ:AGREE;
          return(
            <div key={q.id} style={{background:CLR.card,borderRadius:16,padding:"20px",
              boxShadow:"0 2px 12px rgba(78,168,222,0.08)",border:`1px solid ${CLR.border}`}}>
              <p style={{margin:"0 0 16px",fontSize:14,lineHeight:1.85,color:CLR.txt}}>{q.text}</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5}}>
                {scale.map((label,i)=>{
                  const val=i+1,sel=ans[q.id]===val;
                  return<button key={val} title={label}
                    onClick={()=>setAns(p=>({...p,[q.id]:val}))}
                    style={{padding:"10px 2px",borderRadius:9,
                      border:sel?`2px solid ${CLR.sky}`:`2px solid ${CLR.border}`,
                      background:sel?`linear-gradient(135deg,${CLR.sky},${CLR.skyDk})`:CLR.card,
                      color:sel?"#fff":CLR.muted,
                      fontSize:13,fontWeight:sel?700:400,cursor:"pointer",transition:"all 0.15s"}}>
                    {val}
                  </button>;
                })}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:CLR.muted}}>
                <span>{scale[0]}</span><span>{scale[4]}</span>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:10}}>
        {pg>0&&<button onClick={()=>{setPg(p=>p-1);window.scrollTo(0,0);}}
          style={{flex:1,padding:"14px",borderRadius:12,border:`2px solid ${CLR.border}`,
            background:CLR.card,color:CLR.sub,fontSize:15,cursor:"pointer"}}>
          이전
        </button>}
        <PrimaryBtn style={{flex:2}} disabled={!pageOk} onClick={()=>{
          if(pg===total-1)submit(); else{setPg(p=>p+1);window.scrollTo(0,0);}
        }}>
          {pg===total-1?"리포트 보기":"다음"}
        </PrimaryBtn>
      </div>
    </Page>
  );

  /* RESULT */
  if(phase==="result"&&res){
    const {scores,comp}=res;
    const rtKey=comp.name in ROUTINES?comp.name:"default";
    const rt=ROUTINES[rtKey][m1i]||ROUTINES[rtKey][0];
    const topTypes=comp.sorted.slice(0,6).filter(([,v])=>v>=45);

    return(
      <div style={{minHeight:"100vh",background:CLR.bg}}>
        <div style={{maxWidth:560,margin:"0 auto",padding:"0 16px 64px"}}>

          {/* 헤더 */}
          <div style={{padding:"32px 0 6px",textAlign:"center"}}>
            <span style={{display:"inline-block",background:CLR.skyLt,color:CLR.skyDk,
              padding:"5px 16px",borderRadius:99,fontSize:11,fontWeight:700,
              letterSpacing:"0.1em",marginBottom:8}}>
              일인칭 — 나의 패턴 리포트
            </span>
            {stageLabel&&<div style={{fontSize:11,color:CLR.muted,marginTop:4}}>{stageLabel}</div>}
          </div>

          {/* S1 */}
          <Card>
            <Lbl>나의 고통 패턴</Lbl>
            <h2 style={{margin:"0 0 14px",fontSize:27,fontWeight:700,color:CLR.txt,
              fontFamily:"'Noto Serif KR',serif",lineHeight:1.3}}>
              {comp.name}
            </h2>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:18}}>
              <TypeBadge label={TN[comp.top1[0]]} score={comp.top1[1]} primary/>
              <TypeBadge label={TN[comp.top2[0]]} score={comp.top2[1]}/>
            </div>
            <p style={{margin:0,fontSize:15,lineHeight:1.9,color:CLR.txt}}>{comp.narrative}</p>
            {comp.clinical&&(
              <div style={{marginTop:14,padding:"10px 14px",background:"#FDEEEC",
                borderRadius:10,borderLeft:"3px solid #E87A6E",fontSize:13,color:"#9B3A30"}}>
                ⚠ 이 패턴은 전문적인 연결이 도움이 될 수 있어요.
              </div>
            )}
          </Card>

          {/* S2 */}
          <Card>
            <Lbl>왜 이 패턴인가</Lbl>
            <p style={{margin:"0 0 10px",fontSize:15,lineHeight:1.9,color:CLR.txt}}>
              <strong>{TN[comp.top1[0]]}</strong>의 집착이 <strong>{TN[comp.top2[0]]}</strong> 패턴과
              맞물리면서 고통의 무게가 더 무거워지는 구조입니다.
            </p>
            <p style={{margin:0,fontSize:15,lineHeight:1.9,color:CLR.txt}}>
              두 패턴이 자동으로 작동하는 방식을 이해하는 것이 첫 번째 전환점이에요.
            </p>
          </Card>

          {/* S3 */}
          <Card>
            <Lbl>나의 고통 지도</Lbl>
            <Radar scores={scores}/>
            <div style={{marginTop:20}}>
              {topTypes.map(([type,score])=>(
                <div key={type} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
                  <div style={{width:88,fontSize:12,color:CLR.sub,flexShrink:0}}>{TN[type]}</div>
                  <div style={{flex:1,background:CLR.skyLt,borderRadius:99,height:7,overflow:"hidden"}}>
                    <div style={{
                      background:score>=70?`linear-gradient(90deg,#F9A84D,#E87A6E)`:
                                 score>=55?`linear-gradient(90deg,${CLR.sky},${CLR.skyDk})`:"#AECFE8",
                      height:7,borderRadius:99,width:score+"%",transition:"width 1.2s"}}/>
                  </div>
                  <div style={{width:30,fontSize:12,fontWeight:600,color:CLR.txt,textAlign:"right"}}>{score}</div>
                </div>
              ))}
            </div>
          </Card>

          {/* S4 pivot */}
          <div style={{
            background:`linear-gradient(135deg,${CLR.skyDk},#0E3F6A)`,
            borderRadius:20,padding:"28px 24px",marginBottom:14,
            position:"relative",overflow:"hidden"}}>
            {/* 배경 원형 장식 */}
            <div style={{position:"absolute",top:-30,right:-30,width:140,height:140,
              borderRadius:"50%",background:"rgba(255,255,255,0.05)"}}/>
            <div style={{position:"absolute",bottom:-20,left:20,width:80,height:80,
              borderRadius:"50%",background:"rgba(255,255,255,0.04)"}}/>
            <div style={{fontSize:10,letterSpacing:"0.15em",fontWeight:700,
              color:"#68B3E8",marginBottom:14,position:"relative"}}>
              관점 전환 논거
            </div>
            <p style={{margin:0,fontSize:18,fontWeight:600,lineHeight:1.75,
              color:"#E8F4FD",fontFamily:"'Noto Serif KR',serif",position:"relative"}}>
              "{comp.pivot}"
            </p>
          </div>

          {/* S5 루틴 */}
          <Card>
            <Lbl>지금 할 수 있는 것</Lbl>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <RoutineItem label="지금 당장 5분" text={rt.r1}
                color={CLR.sky} bg={CLR.skyLt}/>
              <RoutineItem label="매일 10분" text={rt.r2}
                color={CLR.warm} bg={CLR.warmLt}/>
              <RoutineItem label="주 1회 30분" text={rt.r3}
                color="#7EB8C0" bg="#EAF5F6"/>
            </div>
          </Card>

          {/* S6 심화 */}
          <Card>
            <button onClick={()=>setOpen(!open)}
              style={{width:"100%",background:"none",border:"none",padding:0,cursor:"pointer",
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <Lbl noMb>패턴 내적 구조</Lbl>
              <span style={{fontSize:22,color:CLR.muted,lineHeight:1,transition:"transform 0.2s",
                transform:open?"rotate(45deg)":"none"}}>+</span>
            </button>
            {open&&(
              <div style={{marginTop:16,fontSize:14,lineHeight:1.9,color:CLR.txt,
                borderTop:`1px solid ${CLR.border}`,paddingTop:16}}>
                <p style={{margin:"0 0 12px"}}>
                  <strong>{TN[comp.top1[0]]}</strong> 패턴은 {comp.top1[1]}점으로,{" "}
                  {comp.top1[1]>=70?"매우 강하게":"뚜렷하게"} 작동하고 있어요.
                  이 패턴은 특정 상황에서 자동으로 활성화되며, 의식적 개입 없이는 반복됩니다.
                </p>
                <p style={{margin:0}}>
                  <strong>{TN[comp.top2[0]]}</strong> 패턴({comp.top2[1]}점)이 함께 나타날 때,
                  두 패턴은 서로를 강화하는 순환 구조를 만들어요.
                  한 패턴을 알아차리는 것만으로도 순환의 고리를 흔들 수 있어요.
                </p>
              </div>
            )}
          </Card>

          {/* S7 자원 */}
          <Card>
            <Lbl>함께 보면 좋은 자원</Lbl>
            {comp.clinical&&(
              <div style={{padding:"14px 16px",background:"#FDEEEC",borderRadius:12,
                border:"1px solid #F4C5BF",marginBottom:12}}>
                <div style={{fontWeight:600,fontSize:13,color:"#9B3A30",marginBottom:8}}>
                  지금 이 무게가 혼자 감당하기 너무 크다면
                </div>
                <div style={{fontSize:13,color:"#9B3A30",lineHeight:1.9}}>
                  📞 자살예방상담전화 <strong>1393</strong> (24시간)<br/>
                  📞 정신건강 위기상담 <strong>1577-0199</strong><br/>
                  🏥 가까운 정신건강복지센터
                </div>
              </div>
            )}
            <div style={{padding:"14px 16px",background:CLR.skyLt,borderRadius:12,
              border:`1px solid ${CLR.border}`}}>
              <div style={{fontWeight:600,fontSize:13,color:CLR.skyDk,marginBottom:6}}>
                비슷한 여정을 걷고 있는 창업자들이 있어요
              </div>
              <div style={{fontSize:13,color:CLR.sub,lineHeight:1.8}}>
                일인칭은 고통의 패턴을 이해하고 관점을 전환하는 창업자 멘탈케어 서비스예요.
              </div>
            </div>
          </Card>

          <button onClick={reset}
            style={{width:"100%",padding:"14px",borderRadius:12,
              border:`2px solid ${CLR.border}`,background:"transparent",
              color:CLR.sky,fontSize:14,cursor:"pointer",marginTop:4}}>
            처음으로 돌아가기
          </button>
        </div>
      </div>
    );
  }
  return null;
}

/* ── UI Helpers ── */
function Page({step,title,sub,children}){
  return(
    <div style={{minHeight:"100vh",background:CLR.bg}}>
      <div style={{maxWidth:540,margin:"0 auto",padding:"0 16px 60px"}}>
        <div style={{padding:"28px 0 20px"}}>
          <div style={{fontSize:10,color:CLR.muted,marginBottom:10,
            letterSpacing:"0.12em",fontWeight:600}}>STEP {step} / 4</div>
          <h2 style={{margin:"0 0 5px",fontSize:22,fontWeight:700,color:CLR.txt,
            fontFamily:"'Noto Serif KR',serif"}}>{title}</h2>
          <p style={{margin:0,fontSize:13,color:CLR.muted}}>{sub}</p>
        </div>
        {children}
      </div>
    </div>
  );
}
function Card({children}){
  return(
    <div style={{background:CLR.card,borderRadius:20,padding:"22px",marginBottom:14,
      boxShadow:"0 2px 16px rgba(78,168,222,0.1)",border:`1px solid ${CLR.border}`}}>
      {children}
    </div>
  );
}
function Lbl({children,noMb}){
  return(
    <div style={{fontSize:10,letterSpacing:"0.12em",fontWeight:700,
      color:CLR.muted,marginBottom:noMb?0:12}}>{children}</div>
  );
}
function TypeBadge({label,score,primary}){
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 12px",
      borderRadius:99,
      background:primary?`linear-gradient(135deg,${CLR.sky},${CLR.skyDk})`:CLR.skyLt,
      color:primary?"#fff":CLR.sub,fontSize:13}}>
      <strong>{label}</strong>
      <span style={{opacity:0.75}}>{score}</span>
    </span>
  );
}
function RoutineItem({label,text,color,bg}){
  return(
    <div style={{borderRadius:12,padding:"14px 16px",background:bg,borderLeft:`3px solid ${color}`}}>
      <div style={{fontSize:10,fontWeight:700,color,letterSpacing:"0.08em",marginBottom:7}}>{label}</div>
      <div style={{fontSize:14,lineHeight:1.8,color:CLR.txt}}>{text}</div>
    </div>
  );
}
function PrimaryBtn({children,disabled,onClick,style={}}){
  return(
    <button disabled={disabled} onClick={onClick}
      style={{width:"100%",padding:"16px",borderRadius:12,border:"none",
        background:disabled?"#C4DFF2":`linear-gradient(135deg,${CLR.sky},${CLR.skyDk})`,
        color:"#fff",fontSize:15,fontWeight:600,
        cursor:disabled?"not-allowed":"pointer",
        transition:"opacity 0.2s",boxShadow:disabled?"none":"0 4px 16px rgba(78,168,222,0.35)",
        ...style}}>
      {children}
    </button>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
