function calcScores(ans){
  const sum={},mn={},mx={};
  QS.forEach(q=>{mn[q.t]=(mn[q.t]||0)+q.w;mx[q.t]=(mx[q.t]||0)+5*q.w;});
  QS.forEach(q=>{const v=ans[q.id];if(!v)return;sum[q.t]=(sum[q.t]||0)+(q.r?6-v:v)*q.w;});
  const sc={};Object.keys(sum).forEach(t=>{sc[t]=Math.round(((sum[t]-mn[t])/(mx[t]-mn[t]))*100);});
  return sc;
}
function getComp(sc){
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const[t1,t2]=sorted;if(!t1||!t2)return null;
  const info=CT[`${t1[0]}+${t2[0]}`]||CT[`${t2[0]}+${t1[0]}`];
  return info?{...info,t1,t2,sorted}:{n:`${TN[t1[0]]} 우세형`,s:`${TN[t1[0]]} 패턴이 가장 강하게 작동하고 있어요. ${TN[t2[0]]} 패턴도 함께 나타나고 있습니다.`,p:'지금 이 패턴은 조건이 만들어낸 반응이에요. 조건이 달라지면 반응도 달라질 수 있어요.',t1,t2,sorted};
}

/* ── Radar ── */
function Radar({scores}){
  const ref=useRef();
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const dpr=window.devicePixelRatio||1,sz=260;
    cv.width=sz*dpr;cv.height=sz*dpr;cv.style.width=sz+'px';cv.style.height=sz+'px';
    const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
    const cx=sz/2,cy=sz/2,R=sz*0.35;
    const gs_keys=['A','B','C','D','E'];
    const vals=gs_keys.map(g=>{const v=Object.entries(scores).filter(([k])=>k[0]===g).map(([,v])=>v);return v.length?Math.max(...v):0;});
    ctx.clearRect(0,0,sz,sz);
    // Rings
    [20,40,60,80,100].forEach((v,ri)=>{
      ctx.beginPath();
      gs_keys.forEach((_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2,r=(v/100)*R;
        i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));});
      ctx.closePath();ctx.strokeStyle=`rgba(193,123,94,${0.06+ri*0.02})`;ctx.lineWidth=1;ctx.stroke();
    });
    // Spokes
    gs_keys.forEach((_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+(R+4)*Math.cos(a),cy+(R+4)*Math.sin(a));
      ctx.strokeStyle='rgba(193,123,94,0.15)';ctx.lineWidth=1;ctx.stroke();});
    // Fill
    ctx.beginPath();
    gs_keys.forEach((_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2,r=(vals[i]/100)*R;
      i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));});
    ctx.closePath();
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    grad.addColorStop(0,'rgba(193,123,94,0.25)');grad.addColorStop(1,'rgba(193,123,94,0.06)');
    ctx.fillStyle=grad;ctx.fill();
    ctx.strokeStyle='#C17B5E';ctx.lineWidth=2;ctx.stroke();
    // Dots
    gs_keys.forEach((_,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2,r=(vals[i]/100)*R;
      ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),4.5,0,Math.PI*2);
      ctx.fillStyle='#9D5E43';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();});
    // Labels
    ctx.font=`500 11.5px 'Noto Sans KR',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    gs_keys.forEach((g,i)=>{const a=(i/5)*Math.PI*2-Math.PI/2;
      ctx.fillStyle='#7A6B62';ctx.fillText(GN[g],cx+(R+28)*Math.cos(a),cy+(R+28)*Math.sin(a));});
  },[scores]);
  return <canvas ref={ref} style={{display:'block',margin:'0 auto'}}/>;
}

      <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
        {M1.map((opt,i)=>(
          <button key={i} className="scale-in" style={{animationDelay:`${i*0.05}s`,
            padding:'17px 18px',borderRadius:14,textAlign:'left',fontSize:15,
            border:m1===i?`1.5px solid ${C.terra}`:`1.5px solid ${C.border}`,
            background:m1===i?C.terraLt:C.card,
            color:m1===i?C.terraDk:C.txt,fontWeight:m1===i?600:400,
            transition:'all 0.18s',lineHeight:1.55,
            boxShadow:m1===i?`0 3px 12px rgba(193,123,94,0.18)`:'0 1px 4px rgba(45,37,32,0.05)'}}
            onClick={()=>setM1(i)}>
            <span style={{marginRight:10,fontSize:13,opacity:0.5}}>{['🌱','🚀','🔄','✨'][i]}</span>{opt}
          </button>
        ))}
      </div>
      <PrimaryBtn disabled={m1===null} onClick={()=>setPhase('survey')}>설문 시작하기</PrimaryBtn>
    </Shell>
  );

  /* SURVEY */
  if(phase==='survey')return(
    <Shell step={3} title={`${pg+1} / ${total}`} sub={`${pct}% 완료`}>
      {/* 프로그레스 */}
      <div style={{marginBottom:24}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:11,color:C.muted,fontWeight:600}}>진행률</span>
          <span style={{fontSize:11,color:C.terra,fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{background:C.border,borderRadius:99,height:5,overflow:'hidden'}}>
          <div style={{background:`linear-gradient(90deg,${C.honey},${C.terra})`,
            height:5,borderRadius:99,width:`${pct}%`,transition:'width 0.6s cubic-bezier(.22,1,.36,1)'}}/>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:22}}>
        {pageQs.map((q,qi)=>{const sc=q.f?FREQ:AGREE;return(
          <div key={q.id} className="scale-in" style={{animationDelay:`${qi*0.06}s`,
            background:C.card,borderRadius:18,padding:'20px',
            boxShadow:'0 2px 14px rgba(45,37,32,0.06)',border:`1px solid ${C.border}`}}>
            <p style={{margin:'0 0 16px',fontSize:14,lineHeight:1.9,color:C.txt}}>{q.q}</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6}}>
              {sc.map((label,i)=>{const v=i+1,sel=ans[q.id]===v;return(
                <button key={v} title={label} onClick={()=>setAns(p=>({...p,[q.id]:v}))}
                  style={{padding:'11px 2px',borderRadius:10,
                    border:sel?`1.5px solid ${C.terra}`:`1.5px solid ${C.border}`,
                    background:sel?`linear-gradient(135deg,${C.honey},${C.terra})`:C.card,
                    color:sel?'#fff':C.muted,
                    fontSize:14,fontWeight:sel?700:400,
                    transition:'all 0.15s',
                    boxShadow:sel?`0 3px 10px rgba(193,123,94,0.3)`:'none'}}>
                  {v}
                </button>
              );})}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:7,fontSize:10,color:C.muted}}>
              <span>{sc[0]}</span><span>{sc[4]}</span>
            </div>
          </div>
        );})}
      </div>
      <div style={{display:'flex',gap:10}}>
        {pg>0&&<Chip onClick={()=>{setPg(p=>p-1);window.scrollTo(0,0);}}>← 이전</Chip>}
        <PrimaryBtn style={{flex:2}} disabled={!pageOk} onClick={()=>{if(pg===total-1)submit();else{setPg(p=>p+1);window.scrollTo(0,0);}}}>
          {pg===total-1?'리포트 보기 →':'다음 →'}
        </PrimaryBtn>
      </div>
    </Shell>
  );

  /* RESULT */
  if(phase==='result'&&res){
    const{sc,comp}=res;
    const rtKey=comp.n in ROUTINES?comp.n:'default';
    const rt=ROUTINES[rtKey][m1i]||ROUTINES[rtKey][0];
    const topTypes=comp.sorted.slice(0,6).filter(([,v])=>v>=44);
    return(
      <div style={{minHeight:'100vh',background:C.bg}}>
        {/* 배경 장식 */}
        <div style={{position:'fixed',top:0,right:0,width:'35vw',height:'60vh',
          background:'radial-gradient(ellipse at top right,rgba(212,165,92,0.1) 0%,transparent 70%)',pointerEvents:'none'}}/>
        <div style={{maxWidth:560,margin:'0 auto',padding:'0 16px 72px',position:'relative'}}>

          {/* 헤더 */}
          <div style={{padding:'36px 0 8px',textAlign:'center'}} className="fade-up">
            <span style={{display:'inline-flex',alignItems:'center',gap:6,
              background:C.terraLt,color:C.terraDk,padding:'5px 16px',
              borderRadius:99,fontSize:11,fontWeight:700,letterSpacing:'0.1em',marginBottom:10}}>
              <span style={{width:5,height:5,borderRadius:'50%',background:C.terra,display:'inline-block'}}/>
              일인칭 — 나의 패턴 리포트
            </span>
            {stageLabel&&<div style={{fontSize:11,color:C.muted,marginTop:6}}>{stageLabel}</div>}
          </div>

          {/* S1 */}
          <Card delay={0}>
            <SLbl>나의 고통 패턴</SLbl>
            <h2 style={{margin:'0 0 16px',fontSize:28,fontWeight:700,color:C.txt,
              fontFamily:"'Noto Serif KR',serif",lineHeight:1.3}}>{comp.n}</h2>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:20}}>
              <TypeTag label={TN[comp.t1[0]]} score={comp.t1[1]} primary/>
              <TypeTag label={TN[comp.t2[0]]} score={comp.t2[1]}/>
            </div>
            <p style={{margin:0,fontSize:15,lineHeight:1.95,color:C.txt}}>{comp.s}</p>
            {comp.c&&(
              <div style={{marginTop:16,padding:'12px 16px',background:C.crisisLt,
                borderRadius:12,borderLeft:`3px solid ${C.crisis}`,fontSize:13,color:'#9B3A30'}}>
                ⚠ 이 패턴은 전문적인 연결이 도움이 될 수 있어요.
              </div>
            )}
          </Card>

          {/* S2 원인 */}
          <Card delay={1}>
            <SLbl>왜 이 패턴인가</SLbl>
            <p style={{margin:'0 0 12px',fontSize:15,lineHeight:1.95,color:C.txt}}>
              <strong style={{color:C.terra}}>{TN[comp.t1[0]]}</strong>의 집착이{' '}
              <strong style={{color:C.sage}}>{TN[comp.t2[0]]}</strong> 패턴과 맞물리면서
              고통의 무게가 더 무거워지는 구조입니다.
            </p>
            <p style={{margin:0,fontSize:15,lineHeight:1.95,color:C.txt}}>
              두 패턴이 자동으로 작동하는 방식을 이해하는 것이 첫 번째 전환점이에요.
            </p>
          </Card>

          {/* S3 고통 지도 */}
          <Card delay={2}>
            <SLbl>나의 고통 지도</SLbl>
            <Radar scores={sc}/>
            <div style={{marginTop:22}}>
              {topTypes.map(([type,score])=>(
                <div key={type} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
                  <div style={{width:82,fontSize:12,color:C.sub,flexShrink:0,fontWeight:500}}>{TN[type]}</div>
                  <div style={{flex:1,background:'#F0EBE5',borderRadius:99,height:6,overflow:'hidden'}}>
                    <div style={{
                      background:score>=70?`linear-gradient(90deg,${C.honey},${C.terra})`:
                                 score>=55?`linear-gradient(90deg,#A8C8BE,${C.sage})`:'#C8BAAE',
                      height:6,borderRadius:99,width:score+'%',
                      transition:'width 1.4s cubic-bezier(.22,1,.36,1)'}}/>
                  </div>
                  <div style={{width:28,fontSize:12,fontWeight:700,color:C.txt,textAlign:'right'}}>{score}</div>
                </div>
              ))}
            </div>
          </Card>

          {/* S4 관점 전환 — 시그니처 카드 */}
          <div className="fade-up" style={{animationDelay:'0.3s',
            borderRadius:22,padding:'32px 28px',marginBottom:14,
            background:`linear-gradient(140deg,#3A2519 0%,#5C3420 60%,#7A4A2E 100%)`,
            position:'relative',overflow:'hidden'}}>
            {/* 장식 원 */}
            <div style={{position:'absolute',top:-40,right:-40,width:160,height:160,
              borderRadius:'50%',background:'rgba(212,165,92,0.12)',pointerEvents:'none'}}/>
            <div style={{position:'absolute',bottom:-30,left:10,width:100,height:100,
              borderRadius:'50%',background:'rgba(193,123,94,0.1)',pointerEvents:'none'}}/>
            {/* 인용 따옴표 */}
            <div style={{fontSize:52,lineHeight:1,color:'rgba(212,165,92,0.25)',
              fontFamily:'Georgia,serif',marginBottom:4,userSelect:'none'}}>"</div>
            <div style={{fontSize:10,letterSpacing:'0.16em',fontWeight:700,
              color:'rgba(212,165,92,0.8)',marginBottom:16,position:'relative'}}>
              관점 전환 논거
            </div>
            <p style={{margin:0,fontSize:18,fontWeight:600,lineHeight:1.8,
              color:'#FAF3E8',fontFamily:"'Noto Serif KR',serif",position:'relative'}}>
              {comp.p}
            </p>
          </div>

          {/* S5 루틴 */}
          <Card delay={4}>
            <SLbl>지금 할 수 있는 것</SLbl>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <RoutineItem i={0} label="지금 당장 — 5분" text={rt[0]} color={C.terra} bg={C.terraLt}/>
              <RoutineItem i={1} label="매일 — 10분" text={rt[1]} color={C.sage} bg={C.sageLt}/>
              <RoutineItem i={2} label="주 1회 — 30분" text={rt[2]} color={C.honey} bg={C.honeyLt}/>
            </div>
          </Card>

          {/* S6 심화 */}
          <Card delay={5}>
            <button onClick={()=>setOpen(!open)}
              style={{width:'100%',background:'none',border:'none',padding:0,
                display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <SLbl noMb>패턴 내적 구조</SLbl>
              <div style={{width:28,height:28,borderRadius:99,
                background:open?C.terraLt:C.border,color:open?C.terra:C.muted,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:16,fontWeight:300,transition:'all 0.2s',flexShrink:0}}>
                {open?'−':'+'}
              </div>
            </button>
            {open&&(
              <div style={{marginTop:16,fontSize:14,lineHeight:1.95,color:C.txt,
                borderTop:`1px solid ${C.border}`,paddingTop:16}} className="fade-in">
                <p style={{margin:'0 0 12px'}}>
                  <strong style={{color:C.terra}}>{TN[comp.t1[0]]}</strong> 패턴은 {comp.t1[1]}점으로,{' '}
                  {comp.t1[1]>=70?'매우 강하게':'뚜렷하게'} 작동하고 있어요.
                  이 패턴은 특정 상황에서 자동으로 활성화되며, 의식적 개입 없이는 반복됩니다.
                </p>
                <p style={{margin:0}}>
                  <strong style={{color:C.sage}}>{TN[comp.t2[0]]}</strong> 패턴({comp.t2[1]}점)이 함께 나타날 때,
                  두 패턴은 서로를 강화하는 순환 구조를 만들어요.
                  한 패턴을 알아차리는 것만으로도 순환의 고리를 흔들 수 있어요.
                </p>
              </div>
            )}
          </Card>

          {/* S7 자원 */}
          <Card delay={6}>
            <SLbl>함께 보면 좋은 자원</SLbl>
            {comp.c&&(
              <div style={{padding:'16px',background:C.crisisLt,borderRadius:14,
                border:`1px solid rgba(192,80,62,0.2)`,marginBottom:12}}>
                <div style={{fontWeight:600,fontSize:13,color:C.crisis,marginBottom:9}}>
                  지금 이 무게가 혼자 감당하기 너무 크다면
                </div>
                <div style={{fontSize:13,color:'#9B3A30',lineHeight:1.95}}>
                  📞 자살예방상담전화 <strong>1393</strong> (24시간)<br/>
                  📞 정신건강 위기상담 <strong>1577-0199</strong><br/>
                  🏥 가까운 정신건강복지센터
                </div>
              </div>
            )}
            <div style={{padding:'16px',background:C.sageLt,borderRadius:14,border:`1px solid rgba(107,158,140,0.25)`}}>
              <div style={{fontWeight:600,fontSize:13,color:'#4A7A6A',marginBottom:7}}>
                비슷한 여정을 걷고 있는 창업자들이 있어요
              </div>
              <div style={{fontSize:13,color:C.sub,lineHeight:1.8}}>
                일인칭은 고통의 패턴을 이해하고 관점을 전환하는 창업자 멘탈케어 서비스예요.
              </div>
            </div>
          </Card>

          <button onClick={reset}
            style={{width:'100%',padding:'14px',borderRadius:12,
              border:`1.5px solid ${C.border}`,background:'transparent',
              color:C.sub,fontSize:14,cursor:'pointer',
              transition:'all 0.18s',marginTop:4}}
            onMouseEnter={e=>{e.target.style.borderColor=C.terra;e.target.style.color=C.terra;}}
            onMouseLeave={e=>{e.target.style.borderColor=C.border;e.target.style.color=C.sub;}}>
            처음으로 돌아가기
          </button>
        </div>
      </div>
    );
  }
  return null;
}

/* ── UI Helpers ── */
function Shell({step,title,sub,children}){
  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      <div style={{position:'fixed',top:0,left:0,right:0,height:3,
        background:`linear-gradient(90deg,${C.honey},${C.terra})`,zIndex:100}}/>
      <div style={{maxWidth:540,margin:'0 auto',padding:'0 16px 64px'}}>
        <div style={{padding:'32px 0 22px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
            {[1,2,3,4].map(s=>(
              <div key={s} style={{flex:1,height:2,borderRadius:99,
                background:s<=step?`linear-gradient(90deg,${C.honey},${C.terra})`:C.border,
                transition:'background 0.3s'}}/>
            ))}
          </div>
          <h2 style={{margin:'0 0 5px',fontSize:22,fontWeight:700,color:C.txt,
            fontFamily:"'Noto Serif KR',serif"}}>{title}</h2>
          <p style={{margin:0,fontSize:13,color:C.muted}}>{sub}</p>
        </div>
        {children}
      </div>
    </div>
  );
}
function Card({children,delay=0}){
  return(
    <div className="fade-up" style={{animationDelay:`${delay*0.08}s`,
      background:C.card,borderRadius:20,padding:'22px',marginBottom:14,
      boxShadow:'0 3px 20px rgba(45,37,32,0.07)',border:`1px solid ${C.border}`}}>
      {children}
    </div>
  );
}
function SLbl({children,noMb}){
  return(
    <div style={{fontSize:10,letterSpacing:'0.14em',fontWeight:700,color:C.muted,
      marginBottom:noMb?0:12}}>{children}</div>
  );
}
function TypeTag({label,score,primary}){
  return(
    <span style={{display:'inline-flex',alignItems:'center',gap:7,padding:'5px 14px',
      borderRadius:99,fontWeight:600,fontSize:13,
      background:primary?`linear-gradient(135deg,${C.honey},${C.terra})`:C.terraLt,
      color:primary?'#fff':C.terraDk,
      boxShadow:primary?`0 4px 14px rgba(193,123,94,0.3)`:'none'}}>
      {label} <span style={{opacity:0.7,fontWeight:400,fontSize:12}}>{score}</span>
    </span>
  );
}
function RoutineItem({i,label,text,color,bg}){
  return(
    <div style={{borderRadius:14,padding:'16px',background:bg,
      borderLeft:`3px solid ${color}`,
      transition:'transform 0.15s'}}
      onMouseEnter={e=>{e.currentTarget.style.transform='translateX(3px)';}}
      onMouseLeave={e=>{e.currentTarget.style.transform='';}} >
      <div style={{fontSize:10,fontWeight:700,color,letterSpacing:'0.1em',marginBottom:8}}>{label}</div>
      <div style={{fontSize:14,lineHeight:1.85,color:C.txt}}>{text}</div>
    </div>
  );
}
function PrimaryBtn({children,disabled,onClick,style={}}){
  return(
    <button disabled={disabled} onClick={onClick}
      style={{width:'100%',padding:'16px',borderRadius:13,border:'none',
        background:disabled?'#DDD5CC':`linear-gradient(135deg,${C.honey} 0%,${C.terra} 100%)`,
        color:'#fff',fontSize:15,fontWeight:600,
        boxShadow:disabled?'none':`0 6px 20px rgba(193,123,94,0.3)`,
        transition:'all 0.18s',...style}}
      onMouseEnter={e=>{if(!disabled){e.target.style.transform='translateY(-1px)';e.target.style.boxShadow=`0 10px 26px rgba(193,123,94,0.38)`;} }}
      onMouseLeave={e=>{e.target.style.transform='';e.target.style.boxShadow=disabled?'none':`0 6px 20px rgba(193,123,94,0.3)`;}}>
      {children}
    </button>
  );
}
function Chip({children,onClick}){
  return(
    <button onClick={onClick}
      style={{padding:'11px 22px',borderRadius:11,border:`1.5px solid ${C.border}`,
        background:C.card,color:C.sub,fontSize:14,
        transition:'all 0.18s'}}
      onMouseEnter={e=>{e.target.style.borderColor=C.terra;e.target.style.color=C.terra;}}
      onMouseLeave={e=>{e.target.style.borderColor=C.border;e.target.style.color=C.sub;}}>
      {children}
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
